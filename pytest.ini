[pytest]
# Root directory for all tests
testpaths = tests

# Minimum pytest version
minversion = 8.0

# Show short tracebacks for cleaner output
addopts = --tb=short -q

# Filter out third-party deprecation warnings (not our code)
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
